  <meta charset="UTF-8">

  <title>AI学習アシスタント | 資格トレイン</title>
  <meta name="description" content="資格トレインのAI学習アシスタント。宅建士・基本情報技術者・CCNA・電験三種・行政書士・地質調査技士・機械設計技術者の勉強方法や試験対策を何でも質問できます。">

  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080c14;
      --surface: #0f1826;
      --surface-2: #162030;
      --surface-3: #1c2840;
      --text: #c8d8f0;
      --text-muted: #6888b0;
      --accent: #3b8fe8;
      --accent-soft: rgba(59,143,232,0.15);
      --accent-glow: rgba(59,143,232,0.3);
      --ai-bg: rgba(139,92,246,0.1);
      --ai-border: rgba(139,92,246,0.25);
      --user-bg: rgba(59,143,232,0.12);
      --user-border: rgba(59,143,232,0.3);
      --radius: 14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: "Zen Kaku Gothic New","Hiragino Sans",sans-serif;
      font-size: 16px; line-height: 1.65;
      color: var(--text); background: var(--bg);
      background-image: radial-gradient(ellipse 80% 40% at 50% -10%, rgba(59,143,232,0.1), transparent);
      display: flex; flex-direction: column;
      min-height: 100dvh;
    }

    /* ─── Nav ─── */
    nav {
      position: sticky; top: 0; z-index: 100;
      height: 52px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
      background: rgba(8,12,20,0.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    nav .brand { display: flex; align-items: center; gap: 7px; text-decoration: none; color: rgba(255,255,255,0.9); font-size: 0.95rem; font-weight: 700; }
    nav .back  { display: flex; align-items: center; gap: 4px; text-decoration: none; color: rgba(255,255,255,0.5); font-size: 0.8rem; }
    nav .back:hover { color: var(--accent); }

    /* ─── Layout ─── */
    .layout {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 680px;
      width: 100%;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* ─── Header ─── */
    .chat-header {
      text-align: center;
      padding: 28px 0 20px;
      flex-shrink: 0;
    }
    .chat-header .icon {
      font-size: 3rem;
      display: block;
      margin-bottom: 10px;
      filter: drop-shadow(0 0 20px rgba(139,92,246,0.5));
    }
    .chat-header h1 { font-size: 1.3rem; font-weight: 700; margin-bottom: 6px; }
    .chat-header p  { font-size: 0.84rem; color: var(--text-muted); }

    /* ─── Suggestion chips ─── */
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 18px;
      flex-shrink: 0;
    }
    .chip {
      padding: 7px 14px;
      background: var(--surface-2);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 999px;
      font-family: inherit;
      font-size: 0.82rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: background .2s, border-color .2s, color .2s;
    }
    .chip:hover {
      background: var(--surface-3);
      border-color: rgba(59,143,232,0.4);
      color: var(--text);
    }

    /* ─── Messages ─── */
    .messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding-bottom: 12px;
      min-height: 0;
    }
    .msg {
      display: flex;
      gap: 10px;
      animation: fadeUp .3s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg.user { flex-direction: row-reverse; }
    .msg-avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .msg.ai   .msg-avatar { background: rgba(139,92,246,0.2); }
    .msg.user .msg-avatar { background: var(--accent-soft); }
    .msg-body {
      max-width: calc(100% - 50px);
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 0.93rem;
      line-height: 1.8;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.ai   .msg-body { background: var(--ai-bg);   border: 1px solid var(--ai-border);  border-bottom-left-radius: 4px; }
    .msg.user .msg-body { background: var(--user-bg); border: 1px solid var(--user-border); border-bottom-right-radius: 4px; color: #c0dcff; }
    .msg.loading .msg-body { color: var(--text-muted); font-style: italic; }
    .msg-body.error { color: #f07178; }

    /* ─── Input area ─── */
    .input-wrap {
      flex-shrink: 0;
      padding: 14px 0 max(20px, env(safe-area-inset-bottom));
      border-top: 1px solid rgba(255,255,255,0.07);
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 10px 14px;
      transition: border-color .2s;
    }
    .input-row:focus-within {
      border-color: rgba(59,143,232,0.5);
      box-shadow: 0 0 0 3px rgba(59,143,232,0.1);
    }
    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: inherit;
      font-size: 0.95rem;
      color: var(--text);
      resize: none;
      line-height: 1.55;
      max-height: 140px;
      overflow-y: auto;
    }
    textarea::placeholder { color: var(--text-muted); }
    .send-btn {
      width: 40px; height: 40px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #3b8fe8, #6070e8);
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity .15s, transform .15s;
    }
    .send-btn:hover:not(:disabled) { opacity: .9; transform: scale(1.05); }
    .send-btn:disabled { opacity: .4; cursor: default; transform: none; }
    .input-hint {
      font-size: 0.73rem;
      color: var(--text-muted);
      text-align: center;
      margin-top: 8px;
    }

    /* ─── Clear btn ─── */
    .clear-btn {
      display: block;
      margin: 0 auto 10px;
      padding: 5px 14px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 999px;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 0.78rem;
      cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    .clear-btn:hover { border-color: rgba(255,255,255,0.25); color: var(--text); }
  </style>
</head>
<body>

<nav>
  <a href="../index.html" class="brand"><span>🚃</span><span>資格トレイン</span></a>
  <a href="../index.html" class="back">← トップへ</a>
</nav>

<div class="layout">
  <div class="chat-header">
    <span class="icon">✨</span>
    <h1>AI学習アシスタント</h1>
    <p>資格の勉強方法・試験対策・用語解説など、なんでも聞いてください</p>
  </div>

  <!-- サジェストチップ -->
  <div class="chips" id="chips">
    <button class="chip" type="button">宅建士の効率的な勉強法は？</button>
    <button class="chip" type="button">基本情報技術者に合格するには？</button>
    <button class="chip" type="button">CCNAとCCNPの違いは？</button>
    <button class="chip" type="button">電験三種の難易度を教えて</button>
    <button class="chip" type="button">行政書士の試験範囲は？</button>
    <button class="chip" type="button">地質調査技士はどんな仕事？</button>
    <button class="chip" type="button">おすすめの資格は何ですか？</button>
    <button class="chip" type="button">TCP/IPとOSI参照モデルの違い</button>
  </div>

  <!-- メッセージ一覧 -->
  <div class="messages" id="messages"></div>

  <!-- 入力エリア -->
  <div class="input-wrap">
    <button class="clear-btn" id="clear-btn" type="button">🗑 会話をリセット</button>
    <div class="input-row">
      <textarea
        id="user-input"
        placeholder="質問を入力… (Shift+Enterで改行)"
        rows="1"
        maxlength="1000"
      ></textarea>
      <button class="send-btn" id="send-btn" type="button" title="送信">
        ↑
      </button>
    </div>
    <p class="input-hint">Gemini AI が回答 · 無料 · 1日最大1,500回</p>
  </div>
</div>

<script>
const GEMINI_URL = '/api/gemini';

const SYSTEM_PROMPT = `あなたは「資格トレイン」という日本の資格学習サイトのAI学習アシスタントです。
以下の資格について詳しく、わかりやすく日本語でサポートします：
- 宅建士（宅地建物取引士）
- 基本情報技術者（FE・IPA）
- CCNA（シスコ技術者認定・200-301）
- 電験三種（第三種電気主任技術者）
- 行政書士
- 地質調査技士
- 機械設計技術者

勉強方法・試験範囲・合格基準・おすすめ教材・用語解説・過去問の解き方など、学習に関することは何でも丁寧に答えてください。
回答は具体的で実践的な内容にしてください。`;

let history = [];
const messagesEl = document.getElementById('messages');
const inputEl    = document.getElementById('user-input');
const sendBtn    = document.getElementById('send-btn');
const clearBtn   = document.getElementById('clear-btn');
const chipsEl    = document.getElementById('chips');

// テキストエリア自動高さ調整
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
});

// Enter 送信 / Shift+Enter 改行
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

sendBtn.addEventListener('click', sendMessage);
clearBtn.addEventListener('click', () => {
  history = [];
  messagesEl.innerHTML = '';
  chipsEl.style.display = 'flex';
});

// チップクリック
chipsEl.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    inputEl.value = chip.textContent;
    inputEl.style.height = 'auto';
    sendMessage();
  });
});

function addMsg(role, text, extraClass = '') {
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}${extraClass ? ' ' + extraClass : ''}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'ai' ? '✨' : '👤';

  const body = document.createElement('div');
  body.className = 'msg-body';
  body.textContent = text;

  wrap.appendChild(avatar);
  wrap.appendChild(body);
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return body;
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || sendBtn.disabled) return;

  // チップを非表示
  chipsEl.style.display = 'none';

  // ユーザーメッセージ追加
  addMsg('user', text);
  history.push({ role: 'user', parts: [{ text }] });
  inputEl.value = '';
  inputEl.style.height = 'auto';

  // ローディング
  const loadingBody = addMsg('ai', '考え中…', 'loading');
  sendBtn.disabled = true;
  inputEl.disabled = true;

  // システムプロンプト + 会話履歴を組み合わせてリクエスト
  const contents = [
    { role: 'user', parts: [{ text: SYSTEM_PROMPT + '\n\n---\n\n' + text }] },
    ...history.slice(0, -1).flatMap(m => [m]),
    history[history.length - 1],
  ];

  // シンプルに最新の質問にシステムプロンプトを付けて送信
  const prompt = SYSTEM_PROMPT + '\n\n---\n\n' +
    history.map(m => (m.role === 'user' ? 'ユーザー: ' : 'アシスタント: ') + m.parts[0].text).join('\n\n');

  try {
    const res = await fetch(GEMINI_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(res.status === 429 ? 'rate_limit' : (err.error || 'HTTP ' + res.status));
    }

    const data = await res.json();
    const reply = data.text || '回答を取得できませんでした。';

    loadingBody.textContent = reply;
    loadingBody.parentElement.classList.remove('loading');
    history.push({ role: 'model', parts: [{ text: reply }] });

    // 履歴は最大10往復まで保持
    if (history.length > 20) history = history.slice(-20);

  } catch (err) {
    loadingBody.classList.add('error');
    loadingBody.parentElement.classList.remove('loading');
    loadingBody.textContent =
      err.message === 'rate_limit'
        ? '⚠️ リクエストが多すぎます。しばらく待ってから再試行してください。'
        : '⚠️ エラーが発生しました: ' + err.message;
    history.pop();
  } finally {
    sendBtn.disabled = false;
    inputEl.disabled = false;
    inputEl.focus();
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
}
</script>
</body>
