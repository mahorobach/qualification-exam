    <script>
        const CATEGORY_ORDER = [
            "電気理論",
            "配線図・記号・識別",

        const builtInQuestions = [
            {
                category: "接地・漏電保護",
                question: "接地工事において、特別第3種接地工事を行う接地抵抗値は、おおむね何オーム以下とすることとされているか。",
                choices: [

            },
            {
                category: "接地・漏電保護",
                question: "定格感度電流が15mA以下の漏電遮断器を用いるのは、主にどのような回路か。",
                choices: [
                    "三相200Vの動力回路",
                    "避雷器の接地側",
                    "主に人体が容易に触れることが想定される電気機器の対地電圧150V以下の回路",
                    "昇圧変圧器の二次側"
                ],
                correctIndex: 2,
                explanation: "定格感度電流15mA以下の漏電遮断器は、感電保護のため、主に人体が容易に触れるおそれのある機器を接続する対地電圧150V以下の回路などに用います（技術基準・工事の実務の両方で重要です）。"
            },
            {
                category: "屋内配線・施工",
                question: "低圧屋内電線路の支持点間の距離が2mを超える場合、支持点間における電線のたわみは、おおむね何mm以下とすることが望ましいとされているか。",
                choices: [
                    "20mm以下",
                    "40mm以下",
                    "60mm以下",
                    "80mm以下"
                ],
                correctIndex: 1,
                explanation: "電気設備技術基準の解釈では、低圧屋内電線路で支持点間の距離が2mを超える場合、支持点間の電線のたわみはおおむね40mm以下とすることが望ましいとされています。"
            }
        ];

        let allQuestions = [];
        let questions = [];
        let sessionCategoryLabel = "";
        let selectedYear = "all";
        let weakQuestionIds = new Set();
        let answeredQids = new Set();
        let categoryStats = {};
        let currentIndex = 0;
        let score = 0;
        let skipAnswerRecording = false;
        let isMockMode = false;

        const questionTextEl = document.getElementById("question-text");
        const choicesEl = document.getElementById("choices");
        const feedbackEl = document.getElementById("feedback");
        const resultLabelEl = document.getElementById("result-label");
        const explanationEl = document.getElementById("explanation");
        const nextBtn = document.getElementById("next-btn");
        const progressLabel = document.getElementById("progress-label");
        const progressFill = document.getElementById("progress-fill");
        const questionNumEl = document.getElementById("question-num");
        const quizScreen = document.getElementById("quiz-screen");
        const summaryScreen = document.getElementById("summary-screen");
        const finalScoreEl = document.getElementById("final-score");
        const finalMessageEl = document.getElementById("final-message");
        const passFailBannerEl = document.getElementById("pass-fail-banner");
        const restartBtn = document.getElementById("restart-btn");
        const subtitleEl = document.getElementById("subtitle");
        const loadWarningEl = document.getElementById("load-warning");
        const menuScreen = document.getElementById("menu-screen");
        const menuHintEl = document.getElementById("menu-hint");
        const categoryButtonsEl = document.getElementById("category-buttons");
        const topBarEl = document.getElementById("top-bar");
        const backBtn = document.getElementById("back-btn");
        const yearFilterEl = document.getElementById("year-filter");
        const weakBtn = document.getElementById("weak-btn");
        const resetAnsweredBtn = document.getElementById("reset-answered-btn");
        const statsListEl = document.getElementById("stats-list");

        function loadStoredStats() {
            try {
                const rawWeak = localStorage.getItem("denkoWeakQuestionIds");
                const arrWeak = rawWeak ? JSON.parse(rawWeak) : [];
                weakQuestionIds = new Set(Array.isArray(arrWeak) ? arrWeak : []);
            } catch (e) {
                weakQuestionIds = new Set();
            }
            try {
                const rawStats = localStorage.getItem("denkoCategoryStats");
                const parsed = rawStats ? JSON.parse(rawStats) : {};
                categoryStats = parsed && typeof parsed === "object" ? parsed : {};
            } catch (e) {
                categoryStats = {};
            }
            try {
                const rawAns = localStorage.getItem("denkoAnsweredQids");
                const arrAns = rawAns ? JSON.parse(rawAns) : [];
                answeredQids = new Set(Array.isArray(arrAns) ? arrAns : []);
            } catch (e) {
                answeredQids = new Set();
            }
        }

        function saveStoredStats() {
            localStorage.setItem("denkoWeakQuestionIds", JSON.stringify(Array.from(weakQuestionIds)));
            localStorage.setItem("denkoCategoryStats", JSON.stringify(categoryStats));
            localStorage.setItem("denkoAnsweredQids", JSON.stringify(Array.from(answeredQids)));
        }

        function getFilteredPool() {
            if (selectedYear === "all") return allQuestions.slice();
            return allQuestions.filter(function (q) {
                return String(q.year || "") === selectedYear;
            });
        }

        function shuffleArray(arr) {
            const a = arr.slice();
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                const t = a[i];
                a[i] = a[j];
                a[j] = t;
            }
            return a;
        }

        function getQuestionStem(text) {
            return String(text || "")
                .replace(/^【\d{4}年(上期|下期)・類題】/, "")
                .trim();
        }

        function avoidAdjacentDuplicateStems(list) {
            const groups = new Map();
            for (const item of list) {
                const stem = getQuestionStem(item.question);
                if (!groups.has(stem)) groups.set(stem, []);
                groups.get(stem).push(item);
            }

            const queue = Array.from(groups.entries()).map(function (entry) {
                return { stem: entry[0], items: entry[1] };
            });
            queue.sort(function (a, b) { return b.items.length - a.items.length; });

            const out = [];
            let prevStem = "";

            while (queue.length > 0) {
                let pickIndex = 0;
                if (queue.length > 1 && queue[0].stem === prevStem) {
                    pickIndex = 1;
                }
                const picked = queue[pickIndex];
                const nextItem = picked.items.shift();
                out.push(nextItem);
                prevStem = picked.stem;

                if (picked.items.length === 0) {
                    queue.splice(pickIndex, 1);
                }
                queue.sort(function (a, b) { return b.items.length - a.items.length; });
            }

            return out;
        }

        /**
         * メニューから分野を選び直すたびに新しい出題順にする。
         * 先にシャッフル → 同一設問の連続を抑える → 最後にもう一度シャッフルで順序のばらつきを強める。
         */
        function shuffleQuizDeck(list) {
            let deck = shuffleArray(list.slice());
            deck = avoidAdjacentDuplicateStems(deck);
            deck = shuffleArray(deck);
            return deck;
        }

        function filterUnansweredByQid(list) {
            return list.filter(function (q) {
                return !answeredQids.has(q._qid);
            });
        }

        function clearAnsweredForRawList(raw) {
            for (let i = 0; i < raw.length; i++) {
                answeredQids.delete(raw[i]._qid);
            }
        }

        function buildDeckFromRaw(raw, skipAnsweredFilter) {
            const list = skipAnsweredFilter ? raw.slice() : filterUnansweredByQid(raw.slice());
            return shuffleQuizDeck(list);
        }

        function tryBuildDeckOrReset(raw, emptyMessage, skipAnsweredFilter) {
            if (skipAnsweredFilter) {
                const deck = buildDeckFromRaw(raw, true);
                if (deck.length === 0) {
                    window.alert(emptyMessage || "出題できる問題がありません。");
                    return null;
                }
                return deck;
            }
            let list = filterUnansweredByQid(raw.slice());
            if (list.length === 0 && raw.length > 0) {
                clearAnsweredForRawList(raw);
                saveStoredStats();
                list = raw.slice();
            }
            if (list.length === 0) {
                window.alert(emptyMessage || "出題できる問題がありません。");
                return null;
            }
            return shuffleQuizDeck(list);
        }

        function pickFromCategoriesForMock(all, spec) {
            const out = [];
            for (let i = 0; i < spec.length; i++) {
                const pool = shuffleArray(all.filter(function (q) {
                    return (q.category || "未分類") === spec[i].cat;
                }));
                const take = Math.min(spec[i].n, pool.length);
                for (let j = 0; j < take; j++) {
                    out.push(pool[j]);
                }
            }
            return avoidAdjacentDuplicateStems(shuffleArray(out));
        }

        function buildBalancedMock(all, total) {
            const cats = CATEGORY_ORDER.filter(function (c) {
                return all.some(function (q) { return (q.category || "未分類") === c; });
            });
            if (cats.length === 0) {
                return [];
            }
            const spec = [];
            const per = Math.floor(total / cats.length);
            let extra = total - per * cats.length;
            for (let i = 0; i < cats.length; i++) {
                const take = per + (extra > 0 ? 1 : 0);
                if (extra > 0) {
                    extra--;
                }
                spec.push({ cat: cats[i], n: take });
            }
            return pickFromCategoriesForMock(all, spec);
        }

        /**
         * 難易度ウェイト指定で45問を選ぶ。
         * easyRatio / medRatio / hardRatio の比率で easy/medium/hard 問題を配分し、
         * 不足分は他難易度から補う。カテゴリ内でランダムに選択。
         */
        function buildDifficultyWeightedMock(all, total, easyRatio, medRatio, hardRatio) {
            const byDiff = {
                easy:   shuffleArray(all.filter(function(q){ return (q.difficulty || "medium") === "easy"; })),
                medium: shuffleArray(all.filter(function(q){ return (q.difficulty || "medium") === "medium"; })),
                hard:   shuffleArray(all.filter(function(q){ return (q.difficulty || "medium") === "hard"; }))
            };
            const totalRatio = easyRatio + medRatio + hardRatio;
            let nEasy   = Math.round(total * easyRatio  / totalRatio);
            let nMedium = Math.round(total * medRatio   / totalRatio);
            let nHard   = Math.round(total * hardRatio  / totalRatio);

            // 合計をtotalに合わせる（端数調整はmediumで吸収）
            let diff = total - (nEasy + nMedium + nHard);
            nMedium += diff;

            // 実際の在庫に合わせてキャップ
            nEasy   = Math.min(nEasy,   byDiff.easy.length);
            nMedium = Math.min(nMedium, byDiff.medium.length);
            nHard   = Math.min(nHard,   byDiff.hard.length);

            // 不足分を他難易度で補完
            let shortage = total - (nEasy + nMedium + nHard);
            if (shortage > 0) {
                const addM = Math.min(shortage, byDiff.medium.length - nMedium);
                nMedium += addM; shortage -= addM;
            }
            if (shortage > 0) {
                const addH = Math.min(shortage, byDiff.hard.length - nHard);
                nHard += addH; shortage -= addH;
            }
            if (shortage > 0) {
                const addE = Math.min(shortage, byDiff.easy.length - nEasy);
                nEasy += addE;
            }

            const pool = [
                ...byDiff.easy.slice(0, nEasy),
                ...byDiff.medium.slice(0, nMedium),
                ...byDiff.hard.slice(0, nHard)
            ];
            return avoidAdjacentDuplicateStems(shuffleArray(pool));
        }

        const MOCK_SETS = {
            // ① easy:medium:hard = 30:50:20（本番レベルよりやや上）
            "mix-45": {
                title: "擬似① 本番想定ミックス（45問）",
                build: function (all) {
                    return buildDifficultyWeightedMock(all, 45, 30, 50, 20);
                }
            },
            // ② easy:medium:hard = 15:55:30（標準〜やや難）
            "level2-45": {
                title: "擬似② 標準〜やや難ミックス（45問）",
                build: function (all) {
                    return buildDifficultyWeightedMock(all, 45, 15, 55, 30);
                }
            },
            // ③ easy:medium:hard = 5:50:45（応用レベル）
            "level3-45": {
                title: "擬似③ 応用レベルミックス（45問）",
                build: function (all) {
                    return buildDifficultyWeightedMock(all, 45, 5, 50, 45);
                }
            },
            // ④ easy:medium:hard = 0:35:65（難問チャレンジ）
            "level4-45": {
                title: "擬似④ 難問チャレンジ（45問）",
                build: function (all) {
                    return buildDifficultyWeightedMock(all, 45, 0, 35, 65);
                }
            },
            // ⑤ easy:medium:hard = 0:15:85（最難関チャレンジ）
            "level5-45": {
                title: "擬似⑤ 最難関チャレンジ（45問）",
                build: function (all) {
                    return buildDifficultyWeightedMock(all, 45, 0, 15, 85);
                }
            }
        };

        function startMockSet(setId) {
            const cfg = MOCK_SETS[setId];
            if (!cfg) {
                window.alert("不明な擬似問題集です。");
                goToMenu();
                return;
            }
            let pool = filterUnansweredByQid(allQuestions.slice());
            let built = cfg.build(pool);
            if (built.length === 0) {
                const full = cfg.build(allQuestions.slice());
                if (full.length > 0) {
                    clearAnsweredForRawList(full);
                    saveStoredStats();
                    pool = filterUnansweredByQid(allQuestions.slice());
                    built = cfg.build(pool);
                }
            }
            if (built.length === 0) {
                window.alert("この擬似問題集を構成できる問題がありません。");
                goToMenu();
                return;
            }
            questions = shuffleQuizDeck(built);
            sessionCategoryLabel = cfg.title;
            skipAnswerRecording = false;
            isMockMode = true;
            currentIndex = 0;
            score = 0;
            menuScreen.style.display = "none";
            summaryScreen.style.display = "none";
            topBarEl.hidden = false;
            quizScreen.style.display = "block";
            renderQuestion();
        }

        function buildYearFilter() {
            const years = new Set();
            for (const q of allQuestions) {
                const y = String(q.year || "").trim();
                if (/^\d{4}$/.test(y)) {
                    years.add(y);
                }
            }
            const sorted = Array.from(years).sort();
            yearFilterEl.innerHTML = "";
            const allOpt = document.createElement("option");
            allOpt.value = "all";
            allOpt.textContent = "全年度";
            yearFilterEl.appendChild(allOpt);
            sorted.forEach(function (y) {
                const opt = document.createElement("option");
                opt.value = y;
                opt.textContent = y + "年";
                yearFilterEl.appendChild(opt);
            });
            yearFilterEl.value = selectedYear;
        }

        function renderCategoryStats() {
            const categories = new Set(CATEGORY_ORDER);
            for (const q of allQuestions) categories.add(q.category || "未分類");
            statsListEl.innerHTML = "";
            Array.from(categories).forEach(function (cat) {
                const st = categoryStats[cat] || { correct: 0, attempted: 0 };
                const row = document.createElement("div");
                row.className = "stats-row";
                const name = document.createElement("span");
                name.textContent = cat;
                const value = document.createElement("span");
                if (!st.attempted) {
                    value.textContent = "-";
                } else {
                    const rate = Math.round((st.correct / st.attempted) * 100);
                    value.textContent = rate + "% (" + st.correct + "/" + st.attempted + ")";
                }
                row.appendChild(name);
                row.appendChild(value);
                statsListEl.appendChild(row);
            });
        }

        function renderQuestion() {
            const q = questions[currentIndex];
            feedbackEl.classList.remove("visible");
            resultLabelEl.textContent = "";
            explanationEl.textContent = "";
            questionNumEl.textContent = sessionCategoryLabel + " · 問題 " + (currentIndex + 1);
            questionTextEl.textContent = q.question;
            choicesEl.innerHTML = "";

            const total = questions.length;
            progressLabel.textContent = (currentIndex + 1) + " / " + total;
            progressFill.style.width = ((currentIndex + 1) / total * 100) + "%";

            q.choices.forEach((label, index) => {
                const btn = document.createElement("button");
                btn.type = "button";
                btn.className = "choice-btn";
                btn.textContent = label;
                btn.addEventListener("click", () => onChoose(index));
                choicesEl.appendChild(btn);
            });
        }

        function onChoose(selectedIndex) {
            const q = questions[currentIndex];
            const buttons = choicesEl.querySelectorAll(".choice-btn");
            const isCorrect = selectedIndex === q.correctIndex;

            const cat = q.category || "未分類";
            if (!categoryStats[cat]) categoryStats[cat] = { correct: 0, attempted: 0 };
            categoryStats[cat].attempted += 1;
            if (isCorrect) {
                categoryStats[cat].correct += 1;
                weakQuestionIds.delete(q._qid);
            } else {
                weakQuestionIds.add(q._qid);
            }
            if (!skipAnswerRecording) {
                answeredQids.add(q._qid);
            }
            saveStoredStats();

            if (isCorrect) score++;

            buttons.forEach((btn, i) => {
                btn.disabled = true;
                if (i === q.correctIndex) {
                    btn.classList.add("correct-pick");
                } else if (i === selectedIndex) {
                    btn.classList.add("wrong-pick");
                }
            });

            if (isCorrect) {
                resultLabelEl.textContent = "正解！";
                resultLabelEl.className = "result-label ok";
            } else {
                resultLabelEl.textContent = "不正解…";
                resultLabelEl.className = "result-label ng";
            }
            explanationEl.textContent = q.explanation;
            feedbackEl.classList.add("visible");

            const isLast = currentIndex === questions.length - 1;
            nextBtn.textContent = isLast ? "結果を見る" : "次の問題へ";
        }

        function goNext() {
            if (currentIndex < questions.length - 1) {
                currentIndex++;
                renderQuestion();
            } else {
                showSummary();
            }
        }

        function showSummary() {
            quizScreen.style.display = "none";
            summaryScreen.style.display = "block";
            topBarEl.hidden = false;
            const total = questions.length;
            finalScoreEl.textContent = score + " / " + total;

            // 擬似問題セット（45問）の合否判定：60%以上で合格
            passFailBannerEl.className = "pass-fail-banner";
            if (isMockMode) {
                const passingScore = Math.ceil(total * 0.6); // 27問
                const pct = Math.round(score / total * 100);
                if (score >= passingScore) {
                    passFailBannerEl.classList.add("pass");
                    passFailBannerEl.innerHTML = "合格 ✓ <span class='pass-threshold'>正答率 " + pct + "% (" + score + "/" + total + ")</span>";
                } else {
                    passFailBannerEl.classList.add("fail");
                    passFailBannerEl.innerHTML = "不合格 ✗ <span class='pass-threshold'>正答率 " + pct + "% (" + score + "/" + total + "）合格ライン " + passingScore + "問以上</span>";
                }
            }

            if (score === total) {
                finalMessageEl.textContent =
                    "全問正解です。この調子で本番もがんばりましょう。分野に戻って同じ条件を選ぶと、未出題がなければ自動で記録がリセットされ、全問が新しい順で出ます。";
            } else if (score >= 1) {
                finalMessageEl.textContent =
                    "解説を復習して、弱点を潰していきましょう。分野に戻って同じ条件を選ぶと、未出題がなければ自動で再出題の準備が整います。";
            } else {
                finalMessageEl.textContent =
                    "用語と数値を教材で押さえ直すと伸びます。分野に戻って同じ条件を選ぶと、未出題がなければ自動で再出題の準備が整います。";
            }
        }

        function restart() {
            currentIndex = 0;
            score = 0;
            summaryScreen.style.display = "none";
            quizScreen.style.display = "block";
            topBarEl.hidden = false;
            renderQuestion();
        }

        function goToMenu() {
            currentIndex = 0;
            score = 0;
            skipAnswerRecording = false;
            feedbackEl.classList.remove("visible");
            summaryScreen.style.display = "none";
            quizScreen.style.display = "none";
            menuScreen.style.display = "block";
            topBarEl.hidden = true;
            if (window.history && window.history.replaceState && location.search) {
                history.replaceState(null, "", location.pathname);
            }
            renderCategoryStats();
            buildCategoryMenu();
        }

        function startCategory(catKey, labelForSession, onlyWeak) {
            const pool = getFilteredPool();
            let source = onlyWeak
                ? pool.filter(function (q) { return weakQuestionIds.has(q._qid); })
                : pool;
            if (catKey === "__all__") {
                questions = source.slice();
            } else {
                questions = source.filter(function (q) {
                    return q.category === catKey;
                });
            }
            if (onlyWeak && questions.length === 0) {
                window.alert("苦手問題がありません。まず通常学習で問題を解いてください。");
                return;
            }
            const emptyMsg = onlyWeak ? "苦手の未出題がありません。" : "この条件の未出題がありません。";
            const deck = tryBuildDeckOrReset(questions, emptyMsg, onlyWeak);
            if (!deck) {
                return;
            }
            questions = deck;
            sessionCategoryLabel = onlyWeak ? (labelForSession + "（苦手）") : labelForSession;
            skipAnswerRecording = onlyWeak;
            isMockMode = false;
            currentIndex = 0;
            score = 0;
            menuScreen.style.display = "none";
            summaryScreen.style.display = "none";
            topBarEl.hidden = false;
            quizScreen.style.display = "block";
            renderQuestion();
        }

        function buildCategoryMenu() {
            categoryButtonsEl.innerHTML = "";
            const pool = getFilteredPool();
            const counts = {};
            for (let i = 0; i < pool.length; i++) {
                const c = pool[i].category || "未分類";
                counts[c] = (counts[c] || 0) + 1;
            }

            function addButton(catKey, title, count) {
                const btn = document.createElement("button");
                btn.type = "button";
                btn.className = "category-btn";
                const main = document.createElement("span");
                main.textContent = title;
                const meta = document.createElement("span");
                meta.className = "cat-meta";
                meta.textContent = count + " 問";
                btn.appendChild(main);
                btn.appendChild(meta);
                btn.addEventListener("click", function () {
                    startCategory(catKey, title, false);
                });
                categoryButtonsEl.appendChild(btn);
            }

            addButton("__all__", "すべて", pool.length);

            for (let j = 0; j < CATEGORY_ORDER.length; j++) {
                const c = CATEGORY_ORDER[j];
                const n = counts[c];
                if (n) {
                    addButton(c, c, n);
                    delete counts[c];
                }
            }

            const rest = Object.keys(counts).sort();
            for (let k = 0; k < rest.length; k++) {
                const c = rest[k];
                addButton(c, c, counts[c]);
            }

            const weakPoolCount = pool.filter(function (q) { return weakQuestionIds.has(q._qid); }).length;
            weakBtn.textContent = "苦手問題だけ再出題（" + weakPoolCount + "問）";
            menuHintEl.textContent =
                "分野の問数は収録件数です（本試験の1回の出題数ではありません）。答えた問題は同じ分野でも出ません。範囲内を全部答えると、次に選んだとき自動で記録がリセットされランダムに再出題されます。戻すは下のリセット。";
        }

        nextBtn.addEventListener("click", goNext);
        restartBtn.addEventListener("click", restart);
        backBtn.addEventListener("click", goToMenu);
        yearFilterEl.addEventListener("change", function () {
            selectedYear = yearFilterEl.value;
            buildCategoryMenu();
        });
        weakBtn.addEventListener("click", function () {
            startCategory("__all__", "すべて", true);
        });
        resetAnsweredBtn.addEventListener("click", function () {
            const ok = window.confirm(
                "一度答えた問題の記録を消し、再び出題されるようにします。よろしいですか？"
            );
            if (!ok) {
                return;
            }
            answeredQids.clear();
            saveStoredStats();
            buildCategoryMenu();
            renderCategoryStats();
        });

        async function loadQuestionBank() {
            const jsonExtra = [];
            try {
                const res = await fetch("questions.json", { cache: "no-store" });
                if (!res.ok) throw new Error("HTTP " + res.status);
                const data = await res.json();
                if (!Array.isArray(data)) throw new Error("not an array");
                for (const item of data) {
                    if (
                        item &&
                        typeof item.question === "string" &&
                        Array.isArray(item.choices) &&
                        item.choices.length === 4 &&
                        typeof item.correctIndex === "number" &&
                        item.correctIndex >= 0 &&
                        item.correctIndex <= 3 &&
                        typeof item.explanation === "string"
                    ) {
                        const cat =
                            typeof item.category === "string" && item.category.trim()
                                ? item.category.trim()
                                : "未分類";
                        jsonExtra.push({
                            category: cat,
                            year: item.year,
                            session: item.session,
                            question: item.question,
                            choices: item.choices,
                            correctIndex: item.correctIndex,
                            explanation: item.explanation
                        });
                    }
                }
            } catch (err) {
                loadWarningEl.hidden = false;
                loadWarningEl.textContent =
                    "questions.json を読み込めませんでした（ブラウザで file:// 直開きのときは制限で失敗することがあります）。内蔵の3問のみで起動しています。同じフォルダでローカルサーバ（例: python3 -m http.server）を立てて開いてください。";
            }
            allQuestions = builtInQuestions.concat(jsonExtra).map(function (item, idx) {
                const year = item.year !== undefined ? item.year : "サンプル";
                const session = item.session !== undefined ? item.session : "";
                const qidSource = [item.category || "", String(year), String(session), item.question, idx].join("|");
                return {
                    category: item.category || "未分類",
                    year: year,
                    session: session,
                    question: item.question,
                    choices: item.choices,
                    correctIndex: item.correctIndex,
                    explanation: item.explanation,
                    _qid: qidSource
                };
            });
            const nIn = builtInQuestions.length;
            const nJson = jsonExtra.length;
            subtitleEl.textContent =
                "スマホ向け · 全 " +
                allQuestions.length +
                " 問（内蔵 " +
                nIn +
                " 問 ＋ JSON " +
                nJson +
                " 問）· 分野別学習";
            buildYearFilter();
            buildCategoryMenu();
            renderCategoryStats();
        }

        async function boot() {
            menuHintEl.textContent = "問題データを読み込み中…";
            categoryButtonsEl.innerHTML = "";
            loadStoredStats();
            await loadQuestionBank();
            const qp = new URLSearchParams(location.search);
            const setId = qp.get("set");
            if (setId && MOCK_SETS[setId]) {
                startMockSet(setId);
            } else {
                goToMenu();
            }
        }

        boot();
    </script>
